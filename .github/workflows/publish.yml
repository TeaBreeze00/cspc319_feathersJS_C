name: Publish to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Write bundled credentials
        run: |
          mkdir -p src/config
          printf "export const BUNDLED_GITHUB_TOKEN = '%s';\n" "$BUNDLED_TOKEN" > src/config/credentials.ts
        env:
          BUNDLED_TOKEN: ${{ secrets.BUNDLED_GITHUB_TOKEN }}

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Publish
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
