name: Rebuild Knowledge Base

on:
  push:
    branches: [main]
    paths:
      - 'docs/v5_docs/**'
      - 'docs/v6_docs/**'

concurrency:
  group: knowledge-base-update-${{ github.sha }}
  cancel-in-progress: false

jobs:
  rebuild:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2 # need HEAD~1 for git diff

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Incremental chunk + embed (changed files only)
        run: |
          npx ts-node \
            --compiler-options '{"module":"CommonJS","esModuleInterop":true,"target":"ES2020"}' \
            scripts/incremental-update.ts

      - name: Commit updated knowledge base
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add knowledge-base/chunks/

          if git diff --staged --quiet; then
            echo "No changes to knowledge base"
          else
            git commit -m "chore: incremental knowledge base update"

            # Retry loop - rebase and push up to 5 times
            for i in {1..5}; do
              git stash && git pull --rebase origin main && git stash pop && git push origin main && break
              echo "Push failed, retrying ($i/5)..."
              sleep $((i * 2))
            done
          fi
